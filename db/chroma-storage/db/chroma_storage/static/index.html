<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AegisAI - Customer Support Chatbot</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="chat-container">
        <div class="glow-bg"></div>

        <header class="chat-header">
            <div class="header-logo">
                <i class="fa-solid fa-robot"></i>
                <div>
                    <h1>AegisAI</h1>
                    <span class="status"><span class="pulse"></span> Online Support</span>
                </div>
            </div>
        </header>

        <!-- Message Panel -->
        <div class="message-area" id="message-area">
            <div class="welcome-card">
                <i class="fa-solid fa-comments"></i>
                <h2>How can I help you today?</h2>
                <p>I can answer questions regarding support policies, delivery times, and refund rules instantly using
                    semantic vector search.</p>
            </div>
        </div>

        <!-- Input Form -->
        <form class="input-form" id="chat-form">
            <input type="text" id="user-input" placeholder="Type your query here..." autocomplete="off" required>
            <button type="submit" class="send-btn">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </form>
    </div>

    <script src="/static/app.js"></script>
</body>

</html>
